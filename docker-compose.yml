# Full stack: `docker compose up --build`
#
# On-prem note: for a hospital VPC, point LIVEKIT_URL at a self-hosted LiveKit
# server and SUPABASE_* at a self-hosted Postgres — no other change needed. The
# agent container has no external dependencies beyond the .env vars.

services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file: .env
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser runs on the host, so it reaches the backend at localhost:8000.
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
